<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jam Waktu — Web Worker</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Outfit:wght@200;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --fg: #f0ece4;
      --muted: #6b6560;
      --accent: #e8553d;
      --accent2: #f5a623;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --glow: rgba(232,85,61,0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* === Latar belakang atmosferik === */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.35;
      animation: blobFloat 12s ease-in-out infinite alternate;
    }

    .bg-blob--1 {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -15%; left: -10%;
      animation-delay: 0s;
    }

    .bg-blob--2 {
      width: 400px; height: 400px;
      background: var(--accent2);
      bottom: -10%; right: -5%;
      animation-delay: -4s;
      animation-duration: 15s;
    }

    .bg-blob--3 {
      width: 300px; height: 300px;
      background: #3d5ae8;
      top: 50%; left: 60%;
      opacity: 0.15;
      animation-delay: -8s;
      animation-duration: 18s;
    }

    @keyframes blobFloat {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(30px, -20px) scale(1.08); }
      100% { transform: translate(-20px, 15px) scale(0.95); }
    }

    /* === Grid noise overlay === */
    .bg-noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* === Konten utama === */
    main {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* === Jam analog canvas === */
    .clock-analog-wrap {
      position: relative;
      width: 320px;
      height: 320px;
    }

    #clockCanvas {
      width: 320px;
      height: 320px;
      border-radius: 50%;
    }

    .clock-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      animation: ringPulse 4s ease-in-out infinite;
    }

    .clock-ring--2 {
      inset: -18px;
      border-color: rgba(232,85,61,0.12);
      animation-delay: -2s;
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%      { opacity: 1; transform: scale(1.01); }
    }

    /* === Jam digital besar === */
    .time-display {
      text-align: center;
    }

    .time-digits {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: clamp(3.5rem, 10vw, 6.5rem);
      letter-spacing: -0.03em;
      line-height: 1;
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.05em;
    }

    .time-digits .hour,
    .time-digits .minute {
      color: var(--fg);
      min-width: 2ch;
      text-align: center;
    }

    .time-digits .separator {
      color: var(--accent);
      font-weight: 200;
      font-size: 0.7em;
      animation: blink 1s step-end infinite;
      margin: 0 0.02em;
    }

    .time-digits .second {
      font-size: 0.38em;
      font-weight: 400;
      color: var(--accent);
      min-width: 2ch;
      text-align: center;
      margin-left: 0.15em;
      align-self: flex-end;
      margin-bottom: 0.15em;
    }

    @keyframes blink {
      50% { opacity: 0.2; }
    }

    /* === Info baris === */
    .info-row {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .info-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.75rem 1.5rem;
      text-align: center;
      backdrop-filter: blur(12px);
      transition: border-color 0.3s, box-shadow 0.3s;
      min-width: 120px;
    }

    .info-card:hover {
      border-color: rgba(232,85,61,0.3);
      box-shadow: 0 0 20px var(--glow);
    }

    .info-card__label {
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .info-card__value {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--fg);
    }

    .info-card__value--accent {
      color: var(--accent);
    }

    /* === Detik progress bar === */
    .second-bar-wrap {
      width: 100%;
      max-width: 420px;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }

    .second-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.15s linear;
      box-shadow: 0 0 8px var(--glow);
    }

    /* === Worker status badge === */
    .worker-badge {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 0.4rem 1rem;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      backdrop-filter: blur(10px);
      text-transform: uppercase;
      font-weight: 500;
    }

    .worker-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 6px #34d399;
      animation: dotPulse 2s ease-in-out infinite;
    }

    .worker-dot--stopped {
      background: #ef4444;
      box-shadow: 0 0 6px #ef4444;
      animation: none;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* === Tombol kontrol === */
    .controls {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      border-radius: 10px;
      padding: 0.55rem 1.3rem;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 16px var(--glow);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .btn--accent {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn--accent:hover {
      background: #d14a33;
      color: #fff;
      box-shadow: 0 0 24px var(--glow);
    }

    /* === Toast notifikasi === */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.7rem 1.4rem;
      font-size: 0.8rem;
      color: var(--fg);
      backdrop-filter: blur(16px);
      z-index: 100;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* === Responsif === */
    @media (max-width: 480px) {
      .clock-analog-wrap {
        width: 240px;
        height: 240px;
      }
      #clockCanvas {
        width: 240px;
        height: 240px;
      }
      .info-row { gap: 0.75rem; }
      .info-card { min-width: 95px; padding: 0.6rem 1rem; }
      .info-card__value { font-size: 1rem; }
    }

    /* === Reduced motion === */
    @media (prefers-reduced-motion: reduce) {
      .bg-blob, .clock-ring, .worker-dot { animation: none !important; }
      .time-digits .separator { animation: none !important; }
      .second-bar-fill { transition: none !important; }
    }
  </style>
</head>
<body>

  <!-- Latar belakang atmosferik -->
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>
    <div class="bg-blob bg-blob--3"></div>
  </div>
  <div class="bg-noise" aria-hidden="true"></div>

  <!-- Status worker -->
  <div class="worker-badge" role="status" aria-label="Status Web Worker">
    <span class="worker-dot" id="workerDot"></span>
    <span id="workerStatus">Worker aktif</span>
  </div>

  <main>
    <!-- Jam analog -->
    <div class="clock-analog-wrap">
      <div class="clock-ring" aria-hidden="true"></div>
      <div class="clock-ring clock-ring--2" aria-hidden="true"></div>
      <canvas id="clockCanvas" width="640" height="640" aria-label="Jam analog"></canvas>
    </div>

    <!-- Jam digital -->
    <div class="time-display" role="timer" aria-live="polite">
      <div class="time-digits">
        <span class="hour" id="dHour">00</span>
        <span class="separator">:</span>
        <span class="minute" id="dMinute">00</span>
        <span class="second" id="dSecond">00</span>
      </div>
    </div>

    <!-- Bar progres detik -->
    <div class="second-bar-wrap" aria-hidden="true">
      <div class="second-bar-fill" id="secondBar" style="width: 0%"></div>
    </div>

    <!-- Info kartu -->
    <div class="info-row">
      <div class="info-card">
        <div class="info-card__label">Hari</div>
        <div class="info-card__value" id="iHari">—</div>
      </div>
      <div class="info-card">
        <div class="info-card__label">Tanggal</div>
        <div class="info-card__value" id="iTanggal">—</div>
      </div>
      <div class="info-card">
        <div class="info-card__label">Bulan</div>
        <div class="info-card__value" id="iBulan">—</div>
      </div>
      <div class="info-card">
        <div class="info-card__label">Tahun</div>
        <div class="info-card__value info-card__value--accent" id="iTahun">—</div>
      </div>
    </div>

    <!-- Tombol kontrol -->
    <div class="controls">
      <button class="btn btn--accent" id="btnToggle" aria-label="Jeda atau lanjutkan worker">Jeda Worker</button>
      <button class="btn" id="btnReset" aria-label="Reset tampilan">Reset</button>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert"></div>

  <script>
    // =============================================
    // Nama hari dan bulan dalam Bahasa Indonesia
    // =============================================
    const NAMA_HARI = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    const NAMA_BULAN = [
      'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
      'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
    ];

    // =============================================
    // Elemen DOM
    // =============================================
    const elHour     = document.getElementById('dHour');
    const elMinute   = document.getElementById('dMinute');
    const elSecond   = document.getElementById('dSecond');
    const elHari     = document.getElementById('iHari');
    const elTanggal  = document.getElementById('iTanggal');
    const elBulan    = document.getElementById('iBulan');
    const elTahun    = document.getElementById('iTahun');
    const elBar      = document.getElementById('secondBar');
    const elDot      = document.getElementById('workerDot');
    const elStatus   = document.getElementById('workerStatus');
    const elToast    = document.getElementById('toast');
    const btnToggle  = document.getElementById('btnToggle');
    const btnReset   = document.getElementById('btnReset');
    const canvas     = document.getElementById('clockCanvas');
    const ctx        = canvas.getContext('2d');

    // =============================================
    // Kode Web Worker (inline via Blob URL)
    // Worker mengirim data waktu setiap 100ms
    // =============================================
    const workerCode = `
      // Nama hari dan bulan dalam Bahasa Indonesia
      var NAMA_HARI = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
      var NAMA_BULAN = [
        'Januari','Februari','Maret','April','Mei','Juni',
        'Juli','Agustus','September','Oktober','November','Desember'
      ];

      var intervalId = null;

      function kirimWaktu() {
        var now = new Date();
        var data = {
          jam:    String(now.getHours()).padStart(2, '0'),
          menit:  String(now.getMinutes()).padStart(2, '0'),
          detik:  String(now.getSeconds()).padStart(2, '0'),
          ms:     now.getMilliseconds(),
          hari:   NAMA_HARI[now.getDay()],
          tanggal: String(now.getDate()).padStart(2, '0'),
          bulan:  NAMA_BULAN[now.getMonth()],
          tahun:  String(now.getFullYear()),
          // Untuk jam analog — pecahan presisi tinggi
          jamF:   now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600,
          menitF: now.getMinutes() + now.getSeconds() / 60 + now.getMilliseconds() / 60000,
          detikF: now.getSeconds() + now.getMilliseconds() / 1000
        };
        self.postMessage(data);
      }

      // Mulai loop pengiriman
      function mulai() {
        if (intervalId !== null) return;
        kirimWaktu();
        intervalId = setInterval(kirimWaktu, 100);
        self.postMessage({ type: 'status', aktif: true });
      }

      function berhenti() {
        if (intervalId !== null) {
          clearInterval(intervalId);
          intervalId = null;
        }
        self.postMessage({ type: 'status', aktif: false });
      }

      // Tanggapi perintah dari main thread
      self.onmessage = function(e) {
        if (e.data === 'mulai')   mulai();
        if (e.data === 'berhenti') berhenti();
      };

      // Otomatis mulai saat worker di-load
      mulai();
    `;

    // Buat Blob URL untuk worker
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const workerURL = URL.createObjectURL(blob);

    // Inisialisasi worker
    let worker = new Worker(workerURL);
    let workerAktif = true;

    // =============================================
    // Terima data dari worker
    // =============================================
    worker.onmessage = function(e) {
      const d = e.data;

      // Pesan status (aktif / berhenti)
      if (d.type === 'status') {
        workerAktif = d.aktif;
        elDot.classList.toggle('worker-dot--stopped', !workerAktif);
        elStatus.textContent = workerAktif ? 'Worker aktif' : 'Worker dijeda';
        return;
      }

      // Update jam digital
      elHour.textContent   = d.jam;
      elMinute.textContent = d.menit;
      elSecond.textContent = d.detik;

      // Update info kartu
      elHari.textContent    = d.hari;
      elTanggal.textContent = d.tanggal;
      elBulan.textContent   = d.bulan;
      elTahun.textContent   = d.tahun;

      // Update progress bar detik (0-100%)
      const progress = ((d.detik * 1000 + d.ms) / 60000) * 100;
      elBar.style.width = progress + '%';

      // Gambar jam analog
      gambarJamAnalog(d.jamF, d.menitF, d.detikF);
    };

    // =============================================
    // Gambar jam analog di canvas
    // =============================================
    function gambarJamAnalog(jamF, menitF, detikF) {
      const W = canvas.width;
      const H = canvas.height;
      const cx = W / 2;
      const cy = H / 2;
      const R = Math.max(1, Math.min(cx, cy) - 30);

      ctx.clearRect(0, 0, W, H);

      // Latar belakang lingkaran
      const bgGrad = ctx.createRadialGradient(cx, cy, R * 0.1, cx, cy, R);
      bgGrad.addColorStop(0, 'rgba(30,28,35,0.9)');
      bgGrad.addColorStop(1, 'rgba(10,10,15,0.95)');
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.fillStyle = bgGrad;
      ctx.fill();

      // Lingkaran tepi
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Skala detik (arc luar)
      const detikAngle = (detikF / 60) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.arc(cx, cy, R - 8, -Math.PI / 2, detikAngle, false);
      ctx.strokeStyle = 'rgba(232,85,61,0.5)';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.stroke();

      // Tanda jam dan menit
      for (let i = 0; i < 60; i++) {
        const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
        const isJam = i % 5 === 0;
        const innerR = isJam ? R - 45 : R - 30;
        const outerR = R - 18;

        const x1 = cx + Math.cos(angle) * innerR;
        const y1 = cy + Math.sin(angle) * innerR;
        const x2 = cx + Math.cos(angle) * outerR;
        const y2 = cy + Math.sin(angle) * outerR;

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = isJam ? 'rgba(240,236,228,0.7)' : 'rgba(240,236,228,0.15)';
        ctx.lineWidth = isJam ? 3 : 1;
        ctx.lineCap = 'round';
        ctx.stroke();
      }

      // Angka jam
      ctx.font = '700 26px Outfit, sans-serif';
      ctx.fillStyle = 'rgba(240,236,228,0.55)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = 1; i <= 12; i++) {
        const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
        const numR = R - 65;
        const x = cx + Math.cos(angle) * numR;
        const y = cy + Math.sin(angle) * numR;
        ctx.fillText(String(i), x, y);
      }

      // Jarum jam
      const jamAngle = ((jamF % 12) / 12) * Math.PI * 2 - Math.PI / 2;
      drawJarum(cx, cy, jamAngle, R * 0.45, 7, 'rgba(240,236,228,0.9)');

      // Jarum menit
      const menitAngle = (menitF / 60) * Math.PI * 2 - Math.PI / 2;
      drawJarum(cx, cy, menitAngle, R * 0.65, 4, 'rgba(240,236,228,0.75)');

      // Jarum detik
      drawJarum(cx, cy, detikAngle, R * 0.72, 2, '#e8553d');

      // Ekor jarum detik
      const tailAngle = detikAngle + Math.PI;
      drawJarum(cx, cy, tailAngle, R * 0.15, 2, '#e8553d');

      // Titik tengah
      ctx.beginPath();
      ctx.arc(cx, cy, 8, 0, Math.PI * 2);
      ctx.fillStyle = '#e8553d';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fillStyle = var_bg();
      ctx.fill();
    }

    function var_bg() {
      return '#0a0a0f';
    }

    function drawJarum(cx, cy, angle, length, width, color) {
      const x = cx + Math.cos(angle) * Math.max(1, length);
      const y = cy + Math.sin(angle) * Math.max(1, length);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(x, y);
      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(1, width);
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // =============================================
    // Tombol kontrol
    // =============================================
    btnToggle.addEventListener('click', function() {
      if (workerAktif) {
        worker.postMessage('berhenti');
        btnToggle.textContent = 'Lanjutkan Worker';
        showToast('Worker dijeda — waktu berhenti update');
      } else {
        worker.postMessage('mulai');
        btnToggle.textContent = 'Jeda Worker';
        showToast('Worker dilanjutkan — waktu kembali update');
      }
    });

    btnReset.addEventListener('click', function() {
      // Hentikan worker lama, buat baru
      worker.terminate();
      worker = new Worker(workerURL);
      workerAktif = true;
      worker.onmessage = arguments.callee; // tidak bisa, perlu re-bind

      // Re-bind handler
      worker.onmessage = function(e) {
        const d = e.data;
        if (d.type === 'status') {
          workerAktif = d.aktif;
          elDot.classList.toggle('worker-dot--stopped', !workerAktif);
          elStatus.textContent = workerAktif ? 'Worker aktif' : 'Worker dijeda';
          return;
        }
        elHour.textContent   = d.jam;
        elMinute.textContent = d.menit;
        elSecond.textContent = d.detik;
        elHari.textContent    = d.hari;
        elTanggal.textContent = d.tanggal;
        elBulan.textContent   = d.bulan;
        elTahun.textContent   = d.tahun;
        const progress = ((d.detik * 1000 + d.ms) / 60000) * 100;
        elBar.style.width = progress + '%';
        gambarJamAnalog(d.jamF, d.menitF, d.detikF);
      };

      btnToggle.textContent = 'Jeda Worker';
      elDot.classList.remove('worker-dot--stopped');
      elStatus.textContent = 'Worker aktif';
      showToast('Worker di-reset — instance baru dibuat');
    });

    // =============================================
    // Toast notifikasi
    // =============================================
    let toastTimer = null;
    function showToast(msg) {
      elToast.textContent = msg;
      elToast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() {
        elToast.classList.remove('show');
      }, 2500);
    }

    // =============================================
    // Partikel latar belakang (ringan, non-worker)
    // =============================================
    (function initParticles() {
      const pCanvas = document.createElement('canvas');
      pCanvas.style.cssText = 'position:fixed;inset:0;z-index:1;pointer-events:none;';
      pCanvas.setAttribute('aria-hidden', 'true');
      document.body.appendChild(pCanvas);
      const pCtx = pCanvas.getContext('2d');
      let particles = [];
      const COUNT = 40;

      function resize() {
        pCanvas.width = window.innerWidth;
        pCanvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // Buat partikel
      for (let i = 0; i < COUNT; i++) {
        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.5 + 0.5,
          dx: (Math.random() - 0.5) * 0.3,
          dy: (Math.random() - 0.5) * 0.3,
          o: Math.random() * 0.3 + 0.05
        });
      }

      function drawParticles() {
        pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
        for (const p of particles) {
          p.x += p.dx;
          p.y += p.dy;
          // Wrap
          if (p.x < -10) p.x = pCanvas.width + 10;
          if (p.x > pCanvas.width + 10) p.x = -10;
          if (p.y < -10) p.y = pCanvas.height + 10;
          if (p.y > pCanvas.height + 10) p.y = -10;

          pCtx.beginPath();
          pCtx.arc(p.x, p.y, Math.max(0.5, p.r), 0, Math.PI * 2);
          pCtx.fillStyle = 'rgba(232,85,61,' + p.o + ')';
          pCtx.fill();
        }
        requestAnimationFrame(drawParticles);
      }

      // Hormati reduced-motion
      if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        drawParticles();
      }
    })();
  </script>
