<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jam Waktu Elegan</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050507;
      --fg: #f2f0eb;
      --muted: #8c8882;
      --accent: #ff4d4d; /* Merah lebih cerah */
      --accent-glow: rgba(255, 77, 77, 0.4);
      --accent2: #ff9f43;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* --- Latar Belakang Atmosferik --- */
    .ambient-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      animation: floatOrb 20s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--accent), transparent 70%);
      top: -20%; left: -15%;
      animation-duration: 25s;
    }

    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #4a2e85, transparent 70%);
      bottom: -10%; right: -10%;
      animation-duration: 30s;
      animation-delay: -5s;
    }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -30px) scale(1.1); }
    }

    /* Overlay Noise halus */
    .noise-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.04;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* --- Kontainer Utama --- */
    main {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      width: 100%;
      max-width: 600px;
      padding: 20px;
    }

    /* --- Jam Analog (Canvas) --- */
    .clock-container {
      position: relative;
      width: 320px;
      height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Cincin luar dekoratif */
    .clock-deco-ring {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 1px solid rgba(255, 77, 77, 0.1);
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      pointer-events: none;
    }

    canvas {
      width: 320px;
      height: 320px;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.6));
      border-radius: 50%;
    }

    /* --- Tampilan Digital --- */
    .digital-clock {
      text-align: center;
      position: relative;
    }

    .time-wrapper {
      display: flex;
      align-items: baseline;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      line-height: 1;
      /* Efek teks glow halus */
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
    }

    .time-main {
      font-size: clamp(3.5rem, 12vw, 6rem);
      font-weight: 300; /* Lebih tipis dan elegan */
      color: var(--fg);
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
    }

    .time-seconds {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
      margin-left: 8px;
      width: 2ch;
      text-align: left;
      font-variant-numeric: tabular-nums;
    }

    /* --- Progress Bar Detik --- */
    .progress-container {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      box-shadow: 0 0 10px var(--accent-glow);
      border-radius: 2px;
    }

    /* --- Kartu Info Tanggal --- */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      margin-top: 10px;
    }

    .info-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 10px;
      text-align: center;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease, border-color 0.3s;
    }

    .info-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 77, 77, 0.3);
      background: rgba(255, 255, 255, 0.05);
    }

    .info-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .info-value {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--fg);
    }

    .info-value.highlight {
      color: var(--accent);
    }

    /* --- Responsif Mobile --- */
    @media (max-width: 480px) {
      .clock-container {
        width: 280px;
        height: 280px;
      }
      canvas {
        width: 280px;
        height: 280px;
      }
      .time-main { font-size: 3.5rem; }
      .info-grid { gap: 8px; }
      .info-card { padding: 10px 6px; }
      .info-value { font-size: 0.95rem; }
    }

    /* --- Prefers Reduced Motion --- */
    @media (prefers-reduced-motion: reduce) {
      .glow-orb { animation: none; }
      .info-card { transition: none; }
    }
  </style>
</head>
<body>

  <!-- Latar Belakang -->
  <div class="ambient-bg">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>
  <div class="noise-overlay"></div>

  <main>
    <!-- Jam Analog -->
    <div class="clock-container">
      <div class="clock-deco-ring"></div>
      <canvas id="clockCanvas" width="640" height="640" aria-label="Jam Analog"></canvas>
    </div>

    <!-- Jam Digital -->
    <div class="digital-clock">
      <div class="time-wrapper">
        <span class="time-main" id="digitalTime">00:00</span>
        <span class="time-seconds" id="digitalSec">00</span>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
      <div class="progress-bar" id="secProgress"></div>
    </div>

    <!-- Informasi Tanggal -->
    <div class="info-grid">
      <div class="info-card">
        <div class="info-label">Hari</div>
        <div class="info-value" id="dayName">—</div>
      </div>
      <div class="info-card">
        <div class="info-label">Tanggal</div>
        <div class="info-value" id="dateNum">—</div>
      </div>
      <div class="info-card">
        <div class="info-label">Bulan</div>
        <div class="info-value highlight" id="monthName">—</div>
      </div>
    </div>
  </main>

  <script>
    /**
     * DATA LOKALISASI
     */
    const DAYS = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    const MONTHS = [
      'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
      'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
    ];

    /**
     * ELEMEN DOM
     */
    const canvas = document.getElementById('clockCanvas');
    const ctx = canvas.getContext('2d');
    const elDigitalTime = document.getElementById('digitalTime');
    const elDigitalSec = document.getElementById('digitalSec');
    const elSecProgress = document.getElementById('secProgress');
    const elDayName = document.getElementById('dayName');
    const elDateNum = document.getElementById('dateNum');
    const elMonthName = document.getElementById('monthName');

    /**
     * LOGIKA UTAMA (Animation Loop)
     * Menggunakan requestAnimationFrame untuk performa terbaik tanpa jeda.
     */
    function animate() {
      const now = new Date();
      
      // Ambil komponen waktu
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      const ms = now.getMilliseconds();

      // Hitung nilai pecahan untuk animasi halus (smooth sweep)
      const smoothSec = s + (ms / 1000);
      const smoothMin = m + (smoothSec / 60);
      const smoothHour = h + (smoothMin / 60);

      // Update DOM Digital
      updateDigitalDisplay(h, m, s, ms);
      
      // Update Canvas Analog
      drawAnalogClock(smoothHour, smoothMin, smoothSec);
      
      // Update Info Tanggal (hanya jika detik 0 untuk efisiensi, tapi di sini kita cek setiap frame aman saja)
      // Agar aman, kita update tanggal saat inisialisasi dan detik ke-0
      if (s === 0 && ms < 20) updateDateDisplay(now);

      // Loop animasi
      requestAnimationFrame(animate);
    }

    /**
     * UPDATE TAMPILAN DIGITAL
     */
    function updateDigitalDisplay(h, m, s, ms) {
      // Format Jam:Menit
      const hh = String(h).padStart(2, '0');
      const mm = String(m).padStart(2, '0');
      elDigitalTime.textContent = `${hh}:${mm}`;

      // Format Detik
      const ss = String(s).padStart(2, '0');
      elDigitalSec.textContent = ss;

      // Progress Bar (detik + milidetik)
      const percentage = ((s * 1000 + ms) / 60000) * 100;
      elSecProgress.style.width = `${percentage}%`;
    }

    /**
     * UPDATE INFO TANGGAL
     */
    function updateDateDisplay(dateObj) {
      elDayName.textContent = DAYS[dateObj.getDay()];
      elDateNum.textContent = String(dateObj.getDate()).padStart(2, '0');
      elMonthName.textContent = MONTHS[dateObj.getMonth()];
    }

    /**
     * GAMBAR JAM ANALOG (CANVAS)
     */
    function drawAnalogClock(hour, minute, second) {
      const width = canvas.width;
      const height = canvas.height;
      const cx = width / 2;
      const cy = height / 2;
      const radius = (width / 2) - 40; // Margin dalam

      // Bersihkan Canvas
      ctx.clearRect(0, 0, width, height);

      // 1. Lingkaran Dasar (Dial)
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      // Gradien halus untuk memberikan kedalaman
      const gradient = ctx.createRadialGradient(cx, cy, radius * 0.8, cx, cy, radius);
      gradient.addColorStop(0, '#1a1a20');
      gradient.addColorStop(1, '#0f0f12');
      ctx.fillStyle = gradient;
      ctx.fill();
      
      // Border luar jam
      ctx.strokeStyle = 'rgba(255, 77, 77, 0.15)';
      ctx.lineWidth = 4;
      ctx.stroke();

      // 2. Tanda Detik (Tick Marks)
      ctx.save();
      ctx.translate(cx, cy);
      for (let i = 0; i < 60; i++) {
        const angle = (i * Math.PI) / 30;
        const isHour = i % 5 === 0;
        
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(0, isHour ? -radius + 25 : -radius + 15);
        ctx.lineTo(0, -radius + 10);
        
        ctx.strokeStyle = isHour ? 'rgba(255, 255, 255, 0.8)' : 'rgba(255, 255, 255, 0.2)';
        ctx.lineWidth = isHour ? 4 : 1;
        ctx.stroke();
        ctx.rotate(-angle);
      }
      ctx.restore();

      // 3. Angka Jam
      ctx.font = 'bold 36px "Outfit", sans-serif';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      for (let num = 1; num <= 12; num++) {
        const angle = (num * Math.PI) / 6 - Math.PI / 2;
        const dist = radius - 65;
        const x = cx + Math.cos(angle) * dist;
        const y = cy + Math.sin(angle) * dist;
        ctx.fillText(num.toString(), x, y);
      }

      // 4. Jarum Jam (Hour)
      drawHand(
        cx, cy, 
        (hour % 12) * 30 * (Math.PI / 180) - Math.PI/2, 
        radius * 0.5, 
        8, 
        '#ffffff'
      );

      // 5. Jarum Menit (Minute)
      drawHand(
        cx, cy, 
        minute * 6 * (Math.PI / 180) - Math.PI/2, 
        radius * 0.75, 
        5, 
        '#cccccc'
      );

      // 6. Jarum Detik (Second) - Merah dengan ekor
      const secAngle = second * 6 * (Math.PI / 180) - Math.PI/2;
      
      // Gambar ekor jarum detik
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(secAngle);
      ctx.beginPath();
      ctx.moveTo(0, 20); // Ekor ke belakang
      ctx.lineTo(0, -radius * 0.85); // Ujung ke depan
      ctx.strokeStyle = '#ff4d4d';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.shadowColor = 'rgba(255, 77, 77, 0.6)';
      ctx.shadowBlur = 10;
      ctx.stroke();
      
      // Lingkaran kecil di ujung jarum detik
      ctx.beginPath();
      ctx.arc(0, -radius * 0.85, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#ff4d4d';
      ctx.fill();
      ctx.restore();

      // 7. Poros Tengah (Center Pin)
      ctx.beginPath();
      ctx.arc(cx, cy, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#ff4d4d';
      ctx.fill();
      
      ctx.beginPath();
      ctx.arc(cx, cy, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#000';
      ctx.fill();
    }

    /**
     * FUNGSI HELPER GAMBAR JARUM
     */
    function drawHand(cx, cy, angleRad, length, width, color) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angleRad);
      
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -length);
      
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      // Shadow halus untuk jarum utama
      if (width > 5) {
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 4;
        ctx.shadowOffsetY = 4;
      }
      
      ctx.stroke();
      ctx.restore();
    }

    // Jalankan animasi pertama kali
    updateDateDisplay(new Date()); // Set tanggal awal
    requestAnimationFrame(animate);

  </script>
</body>
</html>
