<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronos Cyber - Jam Elegan</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Variabel Tema (Default: Cyber Blue) */
      --bg-color: #050505;
      --primary: #00f3ff; /* Cyan Neon */
      --secondary: #bd00ff; /* Purple Neon */
      --text-main: #ffffff;
      --text-muted: #8b9bb4;
      --glass-bg: rgba(20, 20, 25, 0.4);
      --glass-border: rgba(255, 255, 255, 0.1);
      --card-hover: rgba(255, 255, 255, 0.08);
      
      /* Transisi halus untuk pergantian tema */
      --transition-speed: 0.5s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: background-color var(--transition-speed);
    }

    /* --- Canvas Background (Partikel) --- */
    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* --- Overlay Vignette --- */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, var(--bg-color) 120%);
      z-index: 1;
      pointer-events: none;
    }

    /* --- Container Utama --- */
    main {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      max-width: 650px; /* Diperlebar sedikit untuk menampung 4 kolom */
      padding: 20px;
    }

    /* --- Jam Analog Container --- */
    .clock-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
      filter: drop-shadow(0 0 40px rgba(0, 0, 0, 0.5));
    }

    /* Cincin luar yang berputar pelan */
    .outer-ring {
      position: absolute;
      inset: -15px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      border-top-color: var(--primary);
      border-bottom-color: var(--primary);
      animation: spin 10s linear infinite;
      opacity: 0.6;
      transition: border-color var(--transition-speed);
    }

    .outer-ring::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 1px dashed rgba(255, 255, 255, 0.1);
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Canvas Jam */
    #clockCanvas {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 70%);
      backdrop-filter: blur(5px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    /* --- Digital Display --- */
    .digital-container {
      text-align: center;
      position: relative;
      background: var(--glass-bg);
      padding: 15px 30px;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .digital-container:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .time-display {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    .time-main {
      font-size: clamp(3rem, 10vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -2px;
      text-shadow: 0 0 20px rgba(0,0,0,0.5);
      background: linear-gradient(to bottom, #fff, #aaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .time-seconds {
      font-size: 1.5rem;
      color: var(--primary);
      font-weight: 700;
      width: 2.5ch;
      text-align: left;
      text-shadow: 0 0 10px var(--primary);
      transition: color var(--transition-speed), text-shadow var(--transition-speed);
    }

    /* --- Info Cards Grid (UPDATED: 4 Columns) --- */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* Diubah dari 3 menjadi 4 */
      gap: 10px; /* Gap dikurangi sedikit agar muat */
      width: 100%;
    }

    .info-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      padding: 12px 5px; /* Padding vertikal disesuaikan */
      border-radius: 12px;
      text-align: center;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      cursor: default;
    }

    .info-card:hover {
      background: var(--card-hover);
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease, border-color var(--transition-speed);
    }

    .label {
      font-size: 0.65rem; /* Sedikit lebih kecil */
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem; /* Disesuaikan agar muat 4 digit tahun */
      font-weight: 700;
      color: var(--text-main);
    }

    /* --- Controls / Theme Switcher --- */
    .controls {
      display: flex;
      gap: 15px;
      margin-top: 10px;
      background: rgba(0,0,0,0.3);
      padding: 8px 16px;
      border-radius: 30px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(5px);
    }

    .theme-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      position: relative;
    }

    .theme-btn:hover { transform: scale(1.2); }
    .theme-btn.active { border-color: #fff; transform: scale(1.1); }

    /* Theme Colors for Buttons */
    .btn-blue { background: #00f3ff; box-shadow: 0 0 10px #00f3ff; }
    .btn-red { background: #ff2a6d; box-shadow: 0 0 10px #ff2a6d; }
    .btn-green { background: #05ffa1; box-shadow: 0 0 10px #05ffa1; }

    /* --- Footer --- */
    footer {
      margin-top: 30px;
      font-size: 0.8rem;
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* --- Responsive --- */
    @media (max-width: 480px) {
      .clock-wrapper { width: 280px; height: 280px; }
      #clockCanvas { width: 260px; height: 260px; }
      .time-main { font-size: 2.5rem; }
      
      /* Di mobile, kartu bisa lebih rapat */
      .info-grid { gap: 6px; }
      .info-card { padding: 10px 4px; }
      .label { font-size: 0.6rem; letter-spacing: 0.05em; }
      .value { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <!-- Background Canvas untuk Efek Partikel -->
  <canvas id="bgCanvas"></canvas>
  
  <!-- Vignette Overlay -->
  <div class="vignette"></div>

  <main>
    <!-- Bagian Jam Analog -->
    <div class="clock-wrapper">
      <div class="outer-ring"></div>
      <canvas id="clockCanvas" width="600" height="600" aria-label="Jam Analog"></canvas>
    </div>

    <!-- Bagian Jam Digital -->
    <div class="digital-container">
      <div class="time-display">
        <span class="time-main" id="digitalTime">00:00</span>
        <span class="time-seconds" id="digitalSec">00</span>
      </div>
    </div>

    <!-- Kartu Informasi Tanggal (UPDATED: Ada Tahun) -->
    <div class="info-grid">
      <div class="info-card">
        <div class="label">Hari</div>
        <div class="value" id="dayName">—</div>
      </div>
      <div class="info-card">
        <div class="label">Tanggal</div>
        <div class="value" id="dateNum">—</div>
      </div>
      <div class="info-card">
        <div class="label">Bulan</div>
        <div class="value" id="monthName">—</div>
      </div>
      <!-- Kartu Baru: Tahun -->
      <div class="info-card">
        <div class="label">Tahun</div>
        <div class="value" id="yearNum">—</div>
      </div>
    </div>

    <!-- Kontrol Tema -->
    <div class="controls">
      <button class="theme-btn btn-blue active" onclick="setTheme('blue')" aria-label="Tema Biru"></button>
      <button class="theme-btn btn-red" onclick="setTheme('red')" aria-label="Tema Merah"></button>
      <button class="theme-btn btn-green" onclick="setTheme('green')" aria-label="Tema Hijau"></button>
    </div>

    <footer>Design with <span style="color:var(--primary)">♥</span> Riswan Jabar Store </footer>
  </main>

  <script>
    // --- DATA LOKALISASI ---
    const DAYS = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agt', 'Sep', 'Okt', 'Nov', 'Des'];

    // --- KONFIGURASI TEMA ---
    const THEMES = {
      blue: { primary: '#00f3ff', bg: '#050505' },
      red:  { primary: '#ff2a6d', bg: '#1a0505' },
      green:{ primary: '#05ffa1', bg: '#051a0a' }
    };

    let currentTheme = 'blue';

    // --- ELEMEN DOM ---
    const canvas = document.getElementById('clockCanvas');
    const ctx = canvas.getContext('2d');
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    
    const elDigitalTime = document.getElementById('digitalTime');
    const elDigitalSec = document.getElementById('digitalSec');
    const elDayName = document.getElementById('dayName');
    const elDateNum = document.getElementById('dateNum');
    const elMonthName = document.getElementById('monthName');
    const elYearNum = document.getElementById('yearNum'); // Elemen Baru
    const root = document.documentElement;

    // --- SISTEM PARTIKEL LATAR BELAKANG ---
    let particles = [];
    const particleCount = 60; 
    let w, h;

    function resizeBg() {
      w = bgCanvas.width = window.innerWidth;
      h = bgCanvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.size = Math.random() * 2;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > w) this.vx *= -1;
        if (this.y < 0 || this.y > h) this.vy *= -1;
      }
      draw() {
        bgCtx.fillStyle = getComputedStyle(root).getPropertyValue('--text-muted');
        bgCtx.globalAlpha = 0.3;
        bgCtx.beginPath();
        bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        bgCtx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      bgCtx.clearRect(0, 0, w, h);
      
      particles.forEach((p, index) => {
        p.update();
        p.draw();
        
        for (let j = index + 1; j < particles.length; j++) {
          const p2 = particles[j];
          const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
          if (dist < 150) {
            bgCtx.strokeStyle = getComputedStyle(root).getPropertyValue('--primary');
            bgCtx.globalAlpha = 1 - (dist / 150);
            bgCtx.lineWidth = 0.5;
            bgCtx.beginPath();
            bgCtx.moveTo(p.x, p.y);
            bgCtx.lineTo(p2.x, p2.y);
            bgCtx.stroke();
          }
        }
      });
      requestAnimationFrame(animateParticles);
    }

    // --- LOGIKA JAM ---
    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      const ms = now.getMilliseconds();

      // Update Digital
      const hh = String(h).padStart(2, '0');
      const mm = String(m).padStart(2, '0');
      const ss = String(s).padStart(2, '0');
      
      elDigitalTime.textContent = `${hh}:${mm}`;
      elDigitalSec.textContent = ss;

      // Update Tanggal (sekali saja saat detik 0)
      if (s === 0 && ms < 50) {
        elDayName.textContent = DAYS[now.getDay()];
        elDateNum.textContent = String(now.getDate()).padStart(2, '0');
        elMonthName.textContent = MONTHS[now.getMonth()];
        elYearNum.textContent = now.getFullYear(); // Update Tahun
      }

      // Gambar Analog
      drawAnalogClock(h, m, s, ms);

      requestAnimationFrame(updateClock);
    }

    function drawAnalogClock(h, m, s, ms) {
      const width = canvas.width;
      const height = canvas.height;
      const cx = width / 2;
      const cy = height / 2;
      const radius = (width / 2) - 40;

      ctx.clearRect(0, 0, width, height);

      const smoothSec = s + (ms / 1000);
      const smoothMin = m + (smoothSec / 60);
      const smoothHour = h + (smoothMin / 60);

      ctx.save();
      ctx.translate(cx, cy);
      const primaryColor = getComputedStyle(root).getPropertyValue('--primary').trim();
      
      // Ticks
      for (let i = 0; i < 60; i++) {
        const angle = (i * Math.PI) / 30;
        const isHour = i % 5 === 0;
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(0, isHour ? -radius + 20 : -radius + 10);
        ctx.lineTo(0, -radius + 5);
        ctx.strokeStyle = isHour ? '#ffffff' : 'rgba(255, 255, 255, 0.2)';
        ctx.lineWidth = isHour ? 3 : 1;
        ctx.stroke();
        if(isHour) {
           ctx.beginPath();
           ctx.arc(0, -radius + 35, 2, 0, Math.PI*2);
           ctx.fillStyle = primaryColor;
           ctx.fill();
        }
        ctx.rotate(-angle);
      }
      ctx.restore();

      // Hands
      drawHand(cx, cy, (smoothHour % 12) * 30 * (Math.PI / 180) - Math.PI/2, radius * 0.5, 6, '#ffffff', false);
      drawHand(cx, cy, smoothMin * 6 * (Math.PI / 180) - Math.PI/2, radius * 0.75, 4, '#cccccc', false);

      // Second Hand
      const secAngle = smoothSec * 6 * (Math.PI / 180) - Math.PI/2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(secAngle);
      ctx.shadowColor = primaryColor;
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.moveTo(0, 30);
      ctx.lineTo(0, -radius * 0.85);
      ctx.strokeStyle = primaryColor;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, -radius * 0.85, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.restore();

      // Center
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx, cy, 2, 0, Math.PI * 2);
      ctx.fillStyle = primaryColor;
      ctx.fill();
    }

    function drawHand(cx, cy, angleRad, length, width, color, glow) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angleRad);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -length);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.restore();
    }

    // --- FUNGSI GANTI TEMA ---
    window.setTheme = function(themeName) {
      if (!THEMES[themeName]) return;
      currentTheme = themeName;
      const theme = THEMES[themeName];

      root.style.setProperty('--primary', theme.primary);
      root.style.setProperty('--bg-color', theme.bg);

      document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.btn-${themeName}`).classList.add('active');
    };

    // --- INISIALISASI ---
    window.addEventListener('resize', resizeBg);
    resizeBg();
    initParticles();
    animateParticles();
    
    // Set tanggal awal
    const now = new Date();
    elDayName.textContent = DAYS[now.getDay()];
    elDateNum.textContent = String(now.getDate()).padStart(2, '0');
    elMonthName.textContent = MONTHS[now.getMonth()];
    elYearNum.textContent = now.getFullYear(); // Set Tahun Awal

    requestAnimationFrame(updateClock);
  </script>
</body>
</html>
